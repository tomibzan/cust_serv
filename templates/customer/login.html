<!-- templates/customer/login.html -->
<!DOCTYPE html>
<html>
<head>
    <title>Customer Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center h-screen">
    <div class="bg-white p-8 rounded-lg shadow-lg max-w-md w-full">
        <div class="text-center mb-6">
            <h1 class="text-2xl font-bold text-gray-800">Welcome to Our Restaurant</h1>
            <p class="text-gray-600">Login to view menu and call waiter</p>
        </div>
        
        <form method="POST" class="space-y-4">
            {% csrf_token %}
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Phone Number</label>
                <input type="tel" name="phone" required 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="09XXXXXXXX">
            </div>
            
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1">Table Number</label>
                <input type="number" name="table_number" required 
                       class="w-full px-3 py-2 border border-gray-300 rounded-md focus:outline-none focus:ring-2 focus:ring-blue-500"
                       placeholder="Enter your table number">
            </div>
            
            <button type="submit" 
                    class="w-full bg-blue-600 text-white py-2 rounded-md hover:bg-blue-700 transition">
                Start Ordering
            </button>
        </form>
        
        {% if messages %}
            {% for message in messages %}
                <div class="mt-4 p-3 bg-red-100 text-red-700 rounded-md">
                    {{ message }}
                </div>
            {% endfor %}
        {% endif %}
    </div>
</body>
</html>
